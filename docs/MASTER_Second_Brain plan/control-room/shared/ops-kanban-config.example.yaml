# Merge this block into ~/.hermes/profiles/ops/config.yaml
# Orchestrator profile for Berkode employee fleet (Level 3)

kanban:
  orchestrator_profile: ops
  default_board: berkode-ops
  auto_decompose: true
  auto_decompose_per_tick: 2
  dispatch_in_gateway: true

skills:
  # Ensure kanban-orchestrator is enabled for ops (adjust to your skills config shape)
  enabled:
    - kanban-orchestrator
