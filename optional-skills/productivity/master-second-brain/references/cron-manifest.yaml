# MASTER cron templates — installed paused unless --enable is passed.
# Level 4: gateway must be running (hermes dashboard → Services).
jobs:
  - name: MASTER process inbox
    schedule: "0 8 * * 1-5"
    workflow: process-inbox.md
    skills: [obsidian, llm-wiki]
